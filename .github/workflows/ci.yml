name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      swift: ${{ steps.filter.outputs.swift }}
      rust: ${{ steps.filter.outputs.rust }}
      windows: ${{ steps.filter.outputs.windows }}
      linows: ${{ steps.filter.outputs.linows }}
      linows_linux: ${{ steps.filter.outputs.linows_linux }}
      linows_windows: ${{ steps.filter.outputs.linows_windows }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            swift:
              - 'apps/macos/**'
              - 'bridge/ffi/**'
            rust:
              - 'core/**'
              - 'bridge/ffi/**'
              - '.github/workflows/ci.yml'
            windows:
              - 'apps/windows/**'
              - 'bridge/ffi/**'
              - 'core/**'
              - 'scripts/windows/**'
              - '.github/workflows/ci.yml'
            linows:
              - 'apps/linows/**'
              - 'core/**'
              - '.github/workflows/ci.yml'
            linows_linux:
              - 'apps/linows/**'
              - 'core/**'
              - '.github/workflows/ci.yml'
              - '!apps/linows/src-tauri/src/platform/windows/**'
            linows_windows:
              - 'apps/linows/**'
              - 'core/**'
              - '.github/workflows/ci.yml'
              - '!apps/linows/src-tauri/src/platform/linux/**'
              - '!apps/linows/nix/**'

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting (core workspace)
        run: cargo fmt --all --manifest-path core/Cargo.toml -- --check

      - name: Check formatting (ffi crate)
        run: cargo fmt --all --manifest-path bridge/ffi/Cargo.toml -- --check

      - name: Run clippy (core workspace)
        run: cargo clippy --workspace --manifest-path core/Cargo.toml -- -D warnings

      - name: Run clippy (ffi crate)
        run: cargo clippy --manifest-path bridge/ffi/Cargo.toml -- -D warnings

  security:
    name: security
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.linows == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cargo-audit
        run: cargo binstall cargo-audit --no-confirm

      - name: Audit dependencies (core workspace)
        run: cargo audit --file core/Cargo.lock

      - name: Audit dependencies (ffi crate)
        run: cargo audit --file bridge/ffi/Cargo.lock

      - name: Audit dependencies (linows/tauri)
        run: cargo audit --file apps/linows/src-tauri/Cargo.lock

  secrets-scan:
    name: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests (core workspace)
        run: cargo test --workspace --manifest-path core/Cargo.toml

      - name: Run tests (ffi crate)
        run: cargo test --manifest-path bridge/ffi/Cargo.toml

  rust-platform-check:
    name: rust-platform-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (core workspace)
        run: cargo build --workspace --manifest-path core/Cargo.toml

      - name: Test (core workspace)
        run: cargo test --workspace --manifest-path core/Cargo.toml

      - name: Build (ffi crate)
        run: cargo build --manifest-path bridge/ffi/Cargo.toml

      - name: Test (ffi crate)
        run: cargo test --manifest-path bridge/ffi/Cargo.toml

  build:
    name: build
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.rust == 'true' && (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')) ||
        (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'dev'))
      )
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (core workspace)
        run: cargo build --release --workspace --manifest-path core/Cargo.toml

      - name: Build (ffi crate)
        run: cargo build --release --manifest-path bridge/ffi/Cargo.toml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: look-rust-artifacts
          path: |
            core/target/release
            bridge/ffi/target/release
          retention-days: 7

  macos-build:
    name: Build macOS App
    runs-on: macos-latest
    needs: changes
    if: github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'dev') && needs.changes.outputs.swift == 'true'
    env:
      # Pin to Xcode 26.3 — the runner default is 16.4, whose Swift 6
      # diagnostics are stricter than current dev machines and produce
      # spurious failures. Match the toolchain we actually develop on.
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Build Look app (Debug)
        run: xcodebuild -project "apps/macos/LauncherApp/look-app.xcodeproj" -scheme "Look" -configuration Debug -destination "platform=macOS" build

  # Legacy WinUI3 app — maintenance mode, CI disabled.
  # To re-enable for a critical bugfix, replace this with the original
  # windows-build job from git history.
  windows-build-skip:
    name: Windows WinUI3 build (skipped — maintenance mode)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.windows == 'true'
    steps:
      - run: echo "Legacy WinUI3 app is in maintenance mode. Skipping CI build."

  linows-build:
    name: Build linows (Tauri, Linux)
    runs-on: ubuntu-22.04
    needs: changes
    if: needs.changes.outputs.linows_linux == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libglib2.0-dev libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf-2.0-dev libharfbuzz-dev libdbus-1-dev \
            libasound2-dev librsvg2-dev libssl-dev \
            libappindicator3-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core
            apps/linows/src-tauri

      - name: Check formatting
        run: cargo fmt --all --manifest-path apps/linows/src-tauri/Cargo.toml -- --check

      - name: Run clippy
        run: cargo clippy --manifest-path apps/linows/src-tauri/Cargo.toml -- -D warnings

      - name: Build (debug)
        run: cargo build --manifest-path apps/linows/src-tauri/Cargo.toml

  linows-build-windows:
    name: Build linows (Tauri, Windows)
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.linows_windows == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # On windows-2025-vs2026, the rust-cache post-step's `tar` call hangs/
      # crashes when archiving the full `target/` dir (no error surfaced, job
      # ends FAILURE even though the build itself passes). Skipping target
      # caching keeps registry/git caching — the win that matters for cargo
      # fetch — while sidestepping the tar issue. Target rebuild on Windows
      # in this job is ~2 min, acceptable.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/linows/src-tauri
          cache-targets: false

      - name: Check formatting
        run: cargo fmt --all --manifest-path apps/linows/src-tauri/Cargo.toml -- --check

      - name: Run clippy
        run: cargo clippy --manifest-path apps/linows/src-tauri/Cargo.toml -- -D warnings

      - name: Build (debug)
        run: cargo build --manifest-path apps/linows/src-tauri/Cargo.toml
