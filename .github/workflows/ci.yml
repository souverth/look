name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      swift: ${{ steps.filter.outputs.swift }}
      rust: ${{ steps.filter.outputs.rust }}
      windows: ${{ steps.filter.outputs.windows }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            swift:
              - 'apps/macos/**'
              - 'bridge/ffi/**'
            rust:
              - 'core/**'
              - 'bridge/ffi/**'
              - '.github/workflows/ci.yml'
            windows:
              - 'apps/windows/**'
              - 'bridge/ffi/**'
              - 'core/**'
              - 'scripts/windows/**'
              - '.github/workflows/ci.yml'

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting (core workspace)
        run: cargo fmt --all --manifest-path core/Cargo.toml -- --check

      - name: Check formatting (ffi crate)
        run: cargo fmt --all --manifest-path bridge/ffi/Cargo.toml -- --check

      - name: Run clippy (core workspace)
        run: cargo clippy --workspace --manifest-path core/Cargo.toml -- -D warnings

      - name: Run clippy (ffi crate)
        run: cargo clippy --manifest-path bridge/ffi/Cargo.toml -- -D warnings

  security:
    name: security
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies (core workspace)
        run: cargo audit --file core/Cargo.lock

      - name: Audit dependencies (ffi crate)
        run: cargo audit --file bridge/ffi/Cargo.lock

  secrets-scan:
    name: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests (core workspace)
        run: cargo test --workspace --manifest-path core/Cargo.toml

      - name: Run tests (ffi crate)
        run: cargo test --manifest-path bridge/ffi/Cargo.toml

  rust-platform-check:
    name: rust-platform-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (core workspace)
        run: cargo build --workspace --manifest-path core/Cargo.toml

      - name: Test (core workspace)
        run: cargo test --workspace --manifest-path core/Cargo.toml

      - name: Build (ffi crate)
        run: cargo build --manifest-path bridge/ffi/Cargo.toml

      - name: Test (ffi crate)
        run: cargo test --manifest-path bridge/ffi/Cargo.toml

  build:
    name: build
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.rust == 'true' && (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')) ||
        (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'dev'))
      )
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (core workspace)
        run: cargo build --release --workspace --manifest-path core/Cargo.toml

      - name: Build (ffi crate)
        run: cargo build --release --manifest-path bridge/ffi/Cargo.toml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: look-rust-artifacts
          path: |
            core/target/release
            bridge/ffi/target/release
          retention-days: 7

  macos-build:
    name: Build macOS App
    runs-on: macos-latest
    needs: changes
    if: github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'dev') && needs.changes.outputs.swift == 'true'
    env:
      # Pin to Xcode 26.3 — the runner default is 16.4, whose Swift 6
      # diagnostics are stricter than current dev machines and produce
      # spurious failures. Match the toolchain we actually develop on.
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Build Look app (Debug)
        run: xcodebuild -project "apps/macos/LauncherApp/look-app.xcodeproj" -scheme "Look" -configuration Debug -destination "platform=macOS" build

  windows-build:
    name: Build Windows App (${{ matrix.platform }})
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.windows == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            rid: win-x64
            rust_target: x86_64-pc-windows-msvc
          - platform: ARM64
            rid: win-arm64
            rust_target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core
            bridge/ffi
          key: ${{ matrix.rust_target }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-${{ matrix.platform }}-nuget-${{ hashFiles('apps/windows/LauncherApp/LauncherApp.csproj') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-nuget-
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore apps/windows/LauncherApp/LauncherApp.csproj -p:Platform=${{ matrix.platform }} -r ${{ matrix.rid }}

      - name: Build (Debug)
        run: dotnet build apps/windows/LauncherApp/LauncherApp.csproj -c Debug -p:Platform=${{ matrix.platform }} -r ${{ matrix.rid }} --no-restore /bl:msbuild.binlog

      - name: Upload msbuild binlog on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-msbuild-binlog-${{ matrix.platform }}
          path: msbuild.binlog
          retention-days: 7
