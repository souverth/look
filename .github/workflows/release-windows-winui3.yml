name: Release Windows App (Legacy - manual only)

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Legacy WinUI3 app is in maintenance mode.
# Automatic releases disabled - use manual dispatch for critical bugfixes only.
# The Tauri-based linows app will replace this for Windows.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.0.0)"
        required: true
        type: string

jobs:
  build-release:
    uses: ./.github/workflows/reusable-release-windows-winui3.yml
    with:
      release_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      trigger_event: ${{ github.event_name }}
      attach_release: ${{ github.event_name == 'push' }}
      concurrency_ref: ${{ github.ref }}
    secrets: inherit
