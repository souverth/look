version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/core"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      all:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "rust"
    reviewers:
      - "dependabot-preview[bot]"
    target-branch: "dev"
    ignore:
      - dependency-name: "tokio"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: "cargo"
    directory: "/bridge/ffi"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      all:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "rust"
    reviewers:
      - "dependabot-preview[bot]"
    target-branch: "dev"
    ignore:
      - dependency-name: "tokio"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: "cargo"
    directory: "/apps/linows/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      all:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "rust"
      - "linows"
    target-branch: "dev"
