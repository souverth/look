<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Look</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components/results.css" />
  <link rel="stylesheet" href="css/components/preview.css" />
</head>
<body>
  <div id="app" class="launcher-window">
    <div class="search-bar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="10.5" y1="10.5" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input id="query" type="text" placeholder="Search..." autofocus spellcheck="false" autocomplete="off" />
    </div>

    <div class="banner" id="banner" hidden>
      <span class="banner-text"></span>
    </div>

    <div class="content-area">
      <div class="results-list" id="results-list"></div>
      <div class="preview-panel" id="preview-panel" hidden></div>
    </div>

    <div class="hint-bar" id="hint-bar">
      <span>Enter open &bull; Ctrl+F reveal &bull; &uarr;&darr; navigate &bull; Esc hide</span>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
