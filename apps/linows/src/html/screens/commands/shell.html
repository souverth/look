<div class="cmd-panel" id="cmd-panel-shell" hidden>
    <div class="cmd-input-bar">
        <span class="cmd-input-bar-icon" id="cmd-shell-header-icon"></span>
        <input
            id="cmd-shell-input"
            type="text"
            placeholder="Type shell command..."
            spellcheck="false"
            autocomplete="off"
        />
        <span class="cmd-pill">/shell</span>
    </div>
    <div class="cmd-content">
        <div class="cmd-feedback" id="cmd-shell-feedback">Selected /shell</div>
    </div>
</div>
