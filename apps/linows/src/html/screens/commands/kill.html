<div class="cmd-panel" id="cmd-panel-kill" hidden>
    <div class="cmd-input-bar">
        <span class="cmd-input-bar-icon" id="cmd-kill-header-icon"></span>
        <input
            id="cmd-kill-input"
            type="text"
            placeholder="Type app name, or :3000"
            spellcheck="false"
            autocomplete="off"
        />
        <span class="cmd-pill">/kill</span>
    </div>
    <div class="cmd-content">
        <div class="cmd-feedback" id="cmd-kill-feedback"></div>
        <div class="cmd-process-list" id="cmd-kill-list"></div>
    </div>
    <div class="cmd-confirm-bar" id="cmd-kill-confirm" hidden>
        <div class="cmd-confirm-left">
            <img class="cmd-proc-icon" id="cmd-kill-confirm-icon" width="28" height="28" alt="" />
            <div class="cmd-confirm-text">
                <div class="cmd-confirm-title" id="cmd-kill-confirm-title"></div>
                <div class="cmd-confirm-pid" id="cmd-kill-confirm-pid"></div>
            </div>
        </div>
        <div class="cmd-confirm-right">
            <span class="cmd-confirm-yes">Y / Yes</span>
            <span class="cmd-confirm-no">N / No</span>
        </div>
    </div>
</div>
