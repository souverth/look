<div class="cmd-panel" id="cmd-panel-calc" hidden>
    <div class="cmd-input-bar">
        <span class="cmd-input-bar-icon" id="cmd-calc-header-icon"></span>
        <input
            id="cmd-calc-input"
            type="text"
            placeholder="Type math expression"
            spellcheck="false"
            autocomplete="off"
        />
        <span class="cmd-pill">/calc</span>
    </div>
    <div class="cmd-content">
        <div class="cmd-feedback" id="cmd-calc-feedback">Selected /calc</div>
    </div>
</div>
